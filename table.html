<!--table(表格)，用来展示数据-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>table example</title>
    </head>
    <body>
        <!--常用的四个标签，table直接创建一个表格，th(table head)默认加粗居中,tr(table row),td(table data)单元格-->
        <table border="1"><!--边框，厚度1px-->
            <caption>实验耗材情况</caption><!--表格标题-->
            <tr>
                    <th>耗材名称</th>
                    <th>数量</th>
                    <th>状态</th>
            </tr>
            <tr>
                <td>枪头</td>
                <td>10</td>
                <td>不足</td>
            </tr>
            <tr>
                <td>离心管</td>
                <td>30</td>
                <td>不足</td>
            </tr>
            <!--td还可以合并单元格，colspan,rowspan-->
        </table>
    </body>
</html>
